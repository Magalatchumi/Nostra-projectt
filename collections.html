
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collections</title>

    <link rel="stylesheet" href="style.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        .container{
            display:flex;
            padding:20px;
            gap:30px;
        }

        .filter{
            width:250px;
            border-right:2px solid #ddd;
            padding-right:20px;
        }

        .filter h2{
            margin-bottom:15px;
        }

        .filter label{
            display:block;
            margin:10px 0;
            font-size:20px;
        }

        .products{
            flex:1;
        }

        #search{
            width:100%;
            padding:12px;
            border:1px solid gray;
            border-radius:8px;
            margin-bottom:20px;
        }

        .product-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:20px;
        }

        .product{
            text-align:center;
        }

        .product img{
            width:100%;
            height:250px;
            object-fit:cover;
            border-radius:10px;
        }

        .product h3{
            margin-top:10px;
        }

        .product p{
            color:gray;
        }

        @media(max-width:768px){

            .container{
                flex-direction:column;
            }

            .filter{
                width:100%;
                border:none;
            }

        }

    </style>
</head>

<body>

<div class="offer-bar" id="offer-bar">
        <p>Sign Up and GET 20% OFF for your first Order</p>
        <i class="fa-solid fa-xmark" id="close-btn"></i>
    </div>
    <h1 style="padding:20px;">Nostra</h1>


    <div class="container">

        <div class="filter">

            <h2>Occasion</h2>

            <label><input type="checkbox"> Summer</label>
            <label><input type="checkbox"> Party</label>
            <label><input type="checkbox"> Beach</label>

            <br>

            <h2>Colors</h2>

            <label><input type="checkbox"> Red</label>
            <label><input type="checkbox"> Blue</label>
            <label><input type="checkbox"> White</label>
            <label><input type="checkbox"> Green</label>

        </div>


        <div class="products">

            <input
            type="text"
            id="search"
            placeholder="Search Product">

            <div class="product-grid" id="product-grid">

                <div class="product">
                    <img src="./images/shirt1.jpeg">
                    <h3>Floral Summer Shirt</h3>
                    <p>₹220</p>
                </div>

                <div class="product">
                    <img src="./images/shirt2.jpeg">
                    <h3>Summer Green</h3>
                    <p>₹260</p>
                </div>

                <div class="product">
                    <img src="./images/shirt3.jpeg">
                    <h3>Party Floral Shirt</h3>
                    <p>₹399</p>
                </div>

                <div class="product">
                    <img src="./images/shirt4.jpeg">
                    <h3>Beach Shirt</h3>
                    <p>₹450</p>
                </div>

                <div class="product">
                    <img src="./images/shirt5.jpeg">
                    <h3>Blue Casual Shirt</h3>
                    <p>₹550</p>
                </div>

                <div class="product">
                    <img src="./images/shirt6.jpeg">
                    <h3>White Cotton Shirt</h3>
                    <p>₹600</p>
                </div>

            </div>

        </div>

    </div>

<script>

let search = document.getElementById("search")

let products = document.querySelectorAll(".product")

search.addEventListener("keyup",function(){

    let enteredValue = search.value.toUpperCase()

    products.forEach(function(product){

        let productName =
        product.querySelector("h3").textContent

        if(productName.toUpperCase().indexOf(enteredValue) < 0){

            product.style.display = "none"

        }

        else{

            product.style.display = "block"

        }

    })

})

</script>

</body>
</html>
